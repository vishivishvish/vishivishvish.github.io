name: Auto Increment Commit

on:
  schedule:
    - cron: "*/40 * * * *"  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run increment script
        run: python script.py

      - name: Commit changes
        run: |
          git config user.name "vishivishvish"
          git config user.email "vishnu.subramanian93@gmail.com"
          git add sample.md
          git diff --cached --quiet || git commit -m "Automated increment"
          git push
