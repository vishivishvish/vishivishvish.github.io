<!DOCTYPE html>

<html lang="en">

  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maayeri | where Active Wear meets heART</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
    
  </head>

  <body>

    <!-- Top Navigation -->
    <header class="header">

      <div class="nav-container">

        <div class="logo">
          <img src="assets/logo.png" alt="Maayeri Logo">
        </div>

        <nav class="nav-menu">
          <a href="#">Home</a>
          <a href="#">Shop Now</a>
          <a href="#">About Us</a>
          <a href="#">Contact Us</a>
          <a href="#">Blog</a>
        </nav>

        <div class="nav-right">
          <a href="#" class="account">My Account</a>
          <div class="cart">
            ₹0.00 <span class="cart-icon">🛒</span>

        </div>
        
      </div>
      
    </header>

    <section class="hero">

      <div class="slider">

        <div class="slide active">
          <img src="assets/hero1.jpg" alt="Athleisure Slide 1">

        <div class="slide">
          <img src="assets/hero2.jpg" alt="Athleisure Slide 2">
        </div>

        <div class="slide">
          <img src="assets/hero3.jpg" alt="Athleisure Slide 3">
        </div>
        
      </div>

      <div class="hero-content">
        <h1>Edgy and Ethical Styles</h1>
        <p>Athleisure made in India</p>
        <button class="cta-btn">Shop Now!</button>
      </div>

      <button class="prev">&#10094;</button>
      <button class="next">&#10095;</button>
      
    </section>

    <script src="main.js">
    </script>
